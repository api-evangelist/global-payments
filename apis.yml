aid: global-payments
url: 
  https://raw.githubusercontent.com/api-evangelist/global-payments/refs/heads/main/apis.yml
apis:
  - aid: global-payments:payments-api
    name: Global Payments Unified Payments API
    tags:
      - Payments
      - Payment Processing
      - Payment Technology
      - POS
      - eCommerce
    image: 
      https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://apis.globalpay.com
    humanURL: https://developer.globalpayments.com/
    properties:
      - url: https://developer.globalpayments.com/
        type: Portal
      - url: https://developer.globalpayments.com/#!/api
        type: Documentation
      - url: openapi/global-payments-unified-payments-api-openapi.yml
        type: OpenAPI
    description: >-
      The Global Payments Unified Payments API is a cloud-powered REST API
      providing partners and developers with a single integration point for
      payment facilitation, card issuing, and multi-currency payment processing.
      The API supports sandbox testing, comprehensive SDKs, and OAuth 2.0
      authentication for secure payment operations across POS, eCommerce, and
      in-app channels.
  - aid: global-payments:integrated-api
    name: Global Payments Integrated API
    tags:
      - Payments
      - Payment Integration
      - ISV
      - Software Partners
    image: 
      https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api.globalpaymentsintegrated.com
    humanURL: https://developer.globalpaymentsintegrated.com/
    properties:
      - url: https://developer.globalpaymentsintegrated.com/
        type: Portal
      - url: 
          https://www.globalpaymentsintegrated.com/en-us/apis-and-sdks/developer-resources
        type: Documentation
    description: >-
      The Global Payments Integrated API provides ISVs and software partners
      with payment integration capabilities including credit card processing,
      ACH payments, and reporting. The platform supports semi-integrated and
      fully integrated solutions with developer resources, SDKs, and sandbox
      environments.
description: >-
  Global Payments is a leading worldwide provider of payment technology and software
  solutions delivering innovative services to customers globally.
